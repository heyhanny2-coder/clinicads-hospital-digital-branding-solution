
<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClinicAds | 병원 마케팅, 이제 광고 말고 구조로 합니다</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                light: '#FAE8EB',
                pink: '#F6CACA',
                rose: '#E4C2C6',
                lavender: '#CD9FCC',
                navy: '#0A014F',
              }
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Noto Sans KR', sans-serif;
        background-color: #ffffff;
        color: #0A014F;
      }
      .font-serif {
        font-family: 'Playfair Display', serif;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f8fafc;
      }
      ::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.8s ease-out forwards;
      }
      .animate-fade-in {
        animation: fadeIn 0.6s ease-out forwards;
      }
      .vertical-text {
        writing-mode: vertical-rl;
      }
      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .animate-marquee {
        animation: marquee 25s linear infinite;
      }
      @keyframes marqueeUp {
        0% { transform: translateY(0); }
        100% { transform: translateY(-50%); }
      }
      .animate-marquee-up {
        animation: marqueeUp 45s linear infinite;
      }
      .marquee-up-container:hover .animate-marquee-up {
        animation-play-state: paused;
      }
      .marquee-container:hover .animate-marquee {
        animation-play-state: paused;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-12px) rotate(2deg); }
      }
      @keyframes floatReverse {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(8px) rotate(-1deg); }
      }
      @keyframes gradientShift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-float { animation: float 6s ease-in-out infinite; }
      .animate-float-reverse { animation: floatReverse 5s ease-in-out infinite; }
      .animate-scale-in { animation: scaleIn 0.6s ease-out forwards; }
      .animate-slide-up { animation: slideUp 0.6s ease-out forwards; }
      .transition-delay-100 { animation-delay: 100ms; }
      .transition-delay-200 { animation-delay: 200ms; }
      .transition-delay-300 { animation-delay: 300ms; }
      .transition-delay-400 { animation-delay: 400ms; }
      @keyframes gradientFlow {
        0%, 100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
        33% { opacity: 0.9; transform: translate(-48%, -52%) scale(1.05) rotate(3deg); }
        66% { opacity: 0.7; transform: translate(-52%, -48%) scale(0.98) rotate(-2deg); }
      }
      @keyframes blobPulse {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
        50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.8; }
      }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      .animate-gradient-flow { animation: gradientFlow 12s ease-in-out infinite; }
      .animate-blob-pulse { animation: blobPulse 8s ease-in-out infinite; }
      @keyframes bounce-soft {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes wiggle {
        0%, 100% { transform: rotate(-3deg); }
        50% { transform: rotate(3deg); }
      }
      .animate-bounce-soft { animation: bounce-soft 3s ease-in-out infinite; }
      .animate-spin-slow { animation: spin-slow 20s linear infinite; }
      .animate-wiggle { animation: wiggle 4s ease-in-out infinite; }
      @keyframes float-up {
        0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
        50% { transform: translateY(-20px) scale(1.1); opacity: 1; }
      }
      @keyframes glow-pulse {
        0%, 100% { box-shadow: 0 0 20px rgba(205, 159, 204, 0.2); }
        50% { box-shadow: 0 0 40px rgba(205, 159, 204, 0.35); }
      }
      .animate-float-up { animation: float-up 4s ease-in-out infinite; }
      .animate-glow-pulse { animation: glow-pulse 3s ease-in-out infinite; }
      .bg-mesh-gradient {
        background: radial-gradient(at 40% 20%, rgba(241, 245, 249, 0.8) 0px, transparent 50%),
                    radial-gradient(at 80% 0%, rgba(226, 232, 240, 0.5) 0px, transparent 50%),
                    radial-gradient(at 0% 50%, rgba(248, 250, 252, 0.6) 0px, transparent 50%),
                    radial-gradient(at 80% 50%, rgba(10, 1, 79, 0.03) 0px, transparent 50%);
      }
      /* 텍스트 강조 효과 */
      .text-gradient-brand {
        background: linear-gradient(135deg, #0A014F 0%, #CD9FCC 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .text-highlight {
        background: linear-gradient(180deg, transparent 55%, rgba(205, 159, 204, 0.35) 55%, rgba(205, 159, 204, 0.35) 90%, transparent 90%);
        padding: 0 0.15em;
        font-weight: 700;
      }
      .text-highlight-strong {
        background: linear-gradient(180deg, transparent 50%, rgba(205, 159, 204, 0.5) 50%, rgba(205, 159, 204, 0.5) 95%, transparent 95%);
        padding: 0 0.2em;
        font-weight: 800;
      }
      .text-emphasis {
        color: #0A014F;
        font-weight: 700;
      }
      .text-emphasis-lavender {
        color: #CD9FCC;
        font-weight: 700;
      }
      /* 카드/버튼 호버 효과 */
      .card-shimmer {
        position: relative;
        overflow: hidden;
      }
      .card-shimmer::after {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        transition: left 0.6s ease;
      }
      .card-shimmer:hover::after {
        left: 100%;
      }
      .icon-hover-bounce:hover {
        animation: icon-bounce 0.5s ease;
      }
      @keyframes icon-bounce {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.2); }
      }
      .link-underline-expand {
        position: relative;
      }
      .link-underline-expand::after {
        content: '';
        position: absolute;
        bottom: -2px; left: 0;
        width: 0;
        height: 2px;
        background: currentColor;
        transition: width 0.3s ease;
      }
      .link-underline-expand:hover::after {
        width: 100%;
      }
      .step-pulse {
        position: relative;
      }
      .step-pulse::before {
        content: '';
        position: absolute;
        inset: -4px;
        border-radius: 9999px;
        border: 2px solid rgba(205,159,204,0.3);
        animation: pulse-ring 2s ease-out infinite;
        opacity: 0;
      }
      .step-pulse:hover::before {
        opacity: 1;
      }
      @keyframes pulse-ring {
        0% { transform: scale(0.8); opacity: 0.8; }
        100% { transform: scale(1.2); opacity: 0; }
      }
      .typing-cursor::after {
        content: '|';
        animation: blink 1s step-end infinite;
        color: #CD9FCC;
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
      .btn-shine {
        position: relative;
        overflow: hidden;
      }
      .btn-shine::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        transition: left 0.5s ease;
      }
      .btn-shine:hover::before {
        left: 100%;
      }
      .float-delay-1 { animation-delay: 0.5s; }
      .float-delay-2 { animation-delay: 1s; }
      .float-delay-3 { animation-delay: 1.5s; }
      .float-delay-4 { animation-delay: 2s; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
